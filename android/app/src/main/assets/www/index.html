<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AutoVPN</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { -webkit-touch-callout: none; }
        #compact-btn, body.compact #compact-btn { display: none !important; }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <div class="logo">
                <span class="logo-icon">&#x2B21;</span>
                <span class="logo-text">AutoVPN</span><span id="ks-badge" class="ks-badge" title="Kill Switch">&#x1F6E1;</span>
            </div>
            <div class="header-actions">
                <button id="refresh-btn" class="icon-btn" onclick="refreshServers()" title="Обновить">&#8635;</button>
                <button id="theme-toggle" class="icon-btn" onclick="toggleTheme()" title="Тема">&#9728;</button>
                <button class="icon-btn" onclick="toggleSettings()" title="Настройки">&#9881;</button>
            </div>
        </div>

        <div id="location-display" class="location-badge" style="display:none" onclick="copyIP()" title="Нажмите чтобы скопировать IP">
            <span id="country-flag"></span>
            <span id="country-name"></span>
            <span id="ip-display"></span>
            <span id="ip-copy-hint" class="ip-copy-hint">&#x2398;</span><button id="ip-toggle-btn" class="ip-toggle-btn" onclick="toggleIPVisibility()" title="Показать/скрыть IP">&#x1F441;</button>
        </div>

        <div id="settings-panel" class="settings-panel" style="display:none">
            <div class="settings-title">Настройки</div>
            <label class="settings-row">
                <span>Подключаться автоматически</span>
                <input type="checkbox" id="toggle-autoconnect" onchange="onAutoConnectChange(this)">
            </label>
            <label class="settings-row">
                <span>Kill Switch &#x1F6E1;</span>
                <input type="checkbox" id="toggle-killswitch" onchange="onKillSwitchChange(this)">
            </label>
        </div>

        <div class="connect-area">
            <div class="ring-wrapper">
                <svg class="ring-svg" viewBox="0 0 200 200">
                    <circle class="ring-bg" cx="100" cy="100" r="88"/>
                    <circle id="ring-progress" class="ring-progress" cx="100" cy="100" r="88"/>
                </svg>
                <button id="btn" class="power-btn disconnected" onclick="toggle()">
                    <svg class="power-icon" viewBox="0 0 24 24" fill="none">
                        <path d="M12 3v6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                        <path d="M6.3 5.7a8 8 0 1 0 11.4 0" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
            <div id="conn-label" class="conn-label">Нажмите для подключения</div>
            <div id="conn-timer" class="conn-timer" style="display:none">00:00:00</div>
        </div>

        <div id="progress-container" class="progress-container" style="display:none">
            <div class="progress-label">
                <span id="progress-text">Тестирование серверов...</span>
                <span id="progress-count" class="progress-count"></span>
            </div>
            <div class="progress-track">
                <div id="progress-fill" class="progress-fill" style="width:0%"></div>
            </div>
        </div>

        <div id="speed-bar" class="speed-bar" style="display:none">
            <span id="speed-up" class="speed-item speed-up">&#8593; 0 B/s</span>
            <span id="speed-down" class="speed-item speed-down">&#8595; 0 B/s</span>
        </div>

        <div class="info-cards">
            <div class="info-card">
                <div class="info-card-label">Сервер</div>
                <div id="server-name" class="info-card-value">—</div>
            </div>
            <div class="info-card">
                <div class="info-card-label">Пинг</div>
                <div id="server-ping" class="info-card-value">—</div>
            </div>
            <div class="info-card" title="Онлайн / Всего серверов">
                <div class="info-card-label">Серверов</div>
                <div id="server-count" class="info-card-value">—</div>
            </div>
        </div>

        <div id="error-box" class="error-box" style="display:none" onclick="copyError()">
            <svg viewBox="0 0 24 24" fill="none" width="16" height="16"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M12 8v4m0 4h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <div class="error-text" id="error-text"></div>
            <span class="error-copy">копировать</span>
        </div>

        <div class="services-section">
            <div class="services-title">Доступность сервисов</div>
            <div id="services" class="services">
                <div class="svc" data-name="YouTube">
                    <div class="svc-left"><div class="svc-dot idle"></div><span class="svc-name">YouTube</span></div>
                    <span class="svc-badge idle">—</span>
                </div>
                <div class="svc" data-name="Instagram">
                    <div class="svc-left"><div class="svc-dot idle"></div><span class="svc-name">Instagram</span></div>
                    <span class="svc-badge idle">—</span>
                </div>
                <div class="svc" data-name="GitHub">
                    <div class="svc-left"><div class="svc-dot idle"></div><span class="svc-name">GitHub</span></div>
                    <span class="svc-badge idle">—</span>
                </div>
                <div class="svc" data-name="Telegram">
                    <div class="svc-left"><div class="svc-dot idle"></div><span class="svc-name">Telegram</span></div>
                    <span class="svc-badge idle">—</span>
                </div>
            </div>
        </div>


        <!-- Ad banner -->
        <div id="ad-banner" class="ad-banner" style="display:none">
            <span class="ad-label" id="ad-label">Реклама</span>
            <div id="ad-media" class="ad-media" style="display:none"></div>
            <div class="ad-body">
                <div class="ad-text">
                    <div class="ad-title" id="ad-title"></div>
                    <div class="ad-desc" id="ad-desc"></div>
                </div>
                <button class="ad-btn" id="ad-btn" onclick="openAdLink()">Подробнее</button>
            </div>
            <button class="ad-close" onclick="closeAd()" title="Закрыть">&times;</button>
        </div>
        <div class="servers-section">
            <div class="servers-header" onclick="toggleServerList()">
                <span class="servers-title">Серверы</span>
                <span id="servers-arrow" class="history-arrow">&#9660;</span>
            </div>
            <div id="servers-content" style="display:none">
                <div class="servers-auto-row">
                    <button class="servers-auto-btn" id="auto-btn" onclick="switchServer('auto')">&#9654; Автовыбор</button>
                </div>
                <div id="servers-list" class="servers-list"><div class="servers-empty">Нет данных</div></div>
            </div>
        </div>

        <div class="history-section">
            <div class="history-header" onclick="toggleHistory()">
                <span class="history-title">История подключений</span>
                <span id="history-arrow" class="history-arrow">&#9660;</span>
            </div>
            <div id="history-content" style="display:none">
                <div id="history-list" class="history-list"><div class="history-empty">Нет записей</div></div>
            </div>
        </div>
    </div>


        <!-- Preroll ad overlay -->
        <div id="ad-preroll" class="ad-preroll" style="display:none">
            <div class="ad-preroll-inner">
                <div class="ad-preroll-label" id="preroll-label">Реклама</div>
                <div class="ad-preroll-media" id="preroll-media" style="display:none"></div>
                <div class="ad-preroll-title" id="preroll-title"></div>
                <div class="ad-preroll-text" id="preroll-text"></div>
                <button class="ad-preroll-link-btn" id="preroll-link-btn" onclick="openPrerollLink()">Подробнее</button>
                <div class="ad-preroll-footer">
                    <div class="ad-preroll-timer" id="preroll-timer">15</div>
                    <button class="ad-preroll-skip" id="preroll-skip" disabled onclick="skipPreroll()">Пропустить</button>
                </div>
            </div>
        </div>

    <script src="bridge.js"></script>
    <script src="main.js"></script>
</body>
</html>
